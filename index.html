<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcana Eternal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0f19;color:#f1f5f9;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh}
canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
#ui-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#ui-layer>*{pointer-events:auto}
.btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px 48px;font-size:22px;font-weight:700;background:linear-gradient(135deg,#1a5276,#2980b9);color:#fff;border:none;border-radius:12px;cursor:pointer;box-shadow:0 4px 20px rgba(41,128,185,.5);transition:all .2s}
.btn:hover{transform:translate(-50%,-50%) translateY(-3px);box-shadow:0 8px 30px rgba(41,128,185,.7)}
.title{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);font-size:56px;font-weight:800;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;pointer-events:none}
.subtitle{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-size:18px;color:#64748b;pointer-events:none}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui-layer">
<div class="title">ARCANA ETERNAL</div>
<div class="subtitle">Roguelike Deckbuilder Card Game</div>
<button class="btn" id="startBtn">Novo Jogo</button>
</div>
<script src="assets.js"></script>
<script src="game.js"></script>
<script src="content.js"></script>
<script src="effects.js"></script>
<script>
document.getElementById('startBtn').addEventListener('click',function(){
  if(typeof newRun==='function'){runData=newRun();state='map';render();}
  else{alert('Erro: game.js nao carregou. Verifica a consola (F12).');}
});
</script>
</body>
</html>
