<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcana Eternal - Test</title>
<style>
body{background:#0b0f19;color:#f1f5f9;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh}
canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
#ui-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui-layer"></div>
<script src="assets.js"></script>
<script src="game.js"></script>
<script src="content.js"></script>
<script src="effects.js"></script>
<script>
console.log('=== DEBUG ===');
console.log('typeof init:', typeof init);
console.log('typeof resize:', typeof resize);
console.log('typeof render:', typeof render);
console.log('typeof loadAssets:', typeof loadAssets);
console.log('typeof renderMap:', typeof renderMap);
console.log('typeof renderMenu:', typeof renderMenu);

window.addEventListener('DOMContentLoaded', function() {
  console.log('DOMContentLoaded fired');
  try {
    console.log('Calling init()...');
    init();
    console.log('init() OK');
    resize();
    console.log('resize() OK');
    loadAssets(function() {
      console.log('loadAssets callback');
      render();
      console.log('render() OK');
    });
  } catch(e) {
    console.error('ERROR:', e.message, e.stack);
  }
});
</script>
</body>
</html>
